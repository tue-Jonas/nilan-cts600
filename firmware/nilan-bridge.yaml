# ESPHome: Nilan CTS600 — transparent RAW Serial<->TCP Tunnel
# Board: Waveshare ESP32-S3-RS485-CAN (RS-485 transceiver onboard + isolated)
# Role: WLAN<->RS-485 bytes 1:1. No Modbus interpretation on the ESP.
# Panel emulation runs server-side via frodef/nilan-daemon.
substitutions:
  tcp_port: "6638"
esphome:
  name: nilan-bridge
  friendly_name: Nilan CTS600 Bridge
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
logger:
  hardware_uart: USB_SERIAL_JTAG
api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Static IP is recommended because tj-lt socat connects to this endpoint.
  # manual_ip:
  #   static_ip: 192.168.1.50
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  ap:
    ssid: "Nilan-Bridge Setup"
    password: !secret ap_password
captive_portal:
web_server:
  port: 80
external_components:
  - source: github://oxan/esphome-stream-server
uart:
  id: nilan_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  flow_control_pin: GPIO21
  baud_rate: 19200
  data_bits: 8
  # Framing diagnosis (TUE-57, 2026-06-19):
  #   The slave DOES understand our request — it replies with a stable, byte-for-
  #   byte identical 31-byte frame on every read (NOT random => bus/GND is clean).
  #   But the reply fails CRC and the function code reads 0x44 instead of 0x11.
  #   Signature: byte0 (slave addr 0x03) is CORRECT, every byte after it is
  #   corrupted, identically each time. That is the textbook fingerprint of an
  #   RX stop-bit mismatch: the slave replies with 1 stop bit while the strict
  #   ESP-IDF/Arduino UART was set to expect 2 -> it loses byte-sync after byte0.
  #   (A USB-RS485 dongle, as used by upstream frodef users, tolerates this on RX,
  #   which is why their stopbits=2 "works" there but not on the ESP.)
  #   => receive at 8N1. TX stays compatible (the slave already accepted 8N2 TX,
  #   and 8N1 provides the stop bit it needs). Revert to stop_bits: 2 if disproven.
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512
stream_server:
  uart_id: nilan_uart
  port: ${tcp_port}
  buffer_size: 1024
binary_sensor:
  - platform: status
    name: "Nilan Bridge Status"
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Nilan Bridge IP"
