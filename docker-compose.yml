# Nilan CTS600 server-side stack (TUE-22).
# local-first: only the Caddy reverse proxy is meant to be LAN/WAN exposed;
# the API and broker bind to the internal compose network.
#
# Bring-up now (no hardware): NILAN_MOCKUP=1 in env/nilan.env -> full REST+MQTT
# contract works against the frodef mockup. Once the ESP bridge is live, set
# NILAN_MOCKUP=0 and ESP_IP=<bridge ip> and `docker compose up -d`.
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nilan-mosquitto
    restart: unless-stopped
    mem_limit: 96m
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
    ports:
      # Host 1883 is already used by a pre-existing host mosquitto; expose ours on
      # 1884 for local debugging. The API reaches the broker via the compose network.
      - "127.0.0.1:1884:1883"   # local-first; remove if only in-network MQTT needed
    networks: [nilan]

  nilan-api:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: nilan-api:local
    container_name: nilan-api
    restart: unless-stopped
    # tini as PID 1: forwards signals and reaps socat zombies so the entrypoint
    # supervisor can never be orphaned/un-reaped (TUE-100).
    init: true
    mem_limit: 256m
    env_file: ./env/nilan.env
    environment:
      MQTT_HOST: mosquitto
    # Watched by the autoheal sidecar: when /healthz is 503 (bus down >N s) the
    # container is marked unhealthy and autoheal restarts it (TUE-100).
    labels:
      autoheal: "true"
    devices: []
    depends_on: [mosquitto]
    networks: [nilan]
    healthcheck:
      # /healthz returns 503 on a sustained bus disconnect; urlopen raises on
      # 503 -> non-zero exit -> unhealthy. retries*interval keeps a brief blip
      # from flapping while still tripping within the ~1-2 min recovery window.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8642/healthz').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 2
      start_period: 60s

  caddy:
    image: caddy:2
    container_name: nilan-caddy
    restart: unless-stopped
    mem_limit: 96m
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "8643:8643"   # authenticated REST entrypoint (basic auth via Caddyfile)
    depends_on: [nilan-api]
    networks: [nilan]

  # TUE-100: watches containers labeled `autoheal=true` and restarts any that
  # Docker reports `unhealthy`. Plain docker-compose does NOT restart on health
  # status by itself; this sidecar is what turns the bus-aware healthcheck into
  # an actual auto-restart. Local-first: only needs the Docker socket (read).
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: nilan-autoheal
    restart: unless-stopped
    mem_limit: 32m
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "15"        # poll health every 15s
      AUTOHEAL_START_PERIOD: "60"    # ignore health for 60s after a container starts
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  nilan:
    driver: bridge

volumes:
  mosquitto-data:
  caddy-data:
  caddy-config:
