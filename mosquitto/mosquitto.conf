# Mosquitto for the Nilan stack. Local-first, authenticated.
listener 1883
# Auth: credentials in ./mosquitto/passwd (created via `mosquitto_passwd`).
# To (re)create: docker run --rm -v "$PWD/mosquitto:/m" eclipse-mosquitto:2 \
#                  mosquitto_passwd -b -c /m/passwd nilan <password>
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice
